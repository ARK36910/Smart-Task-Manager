<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <div class="container2 loginBox">
        <p class="top">♦ VanillaTask</p>
        <h2 class="major">Welcome back</h2>
        <p class="smalltxt">Log in to access your board</p>
        <form id="loginForm">
            <div class="error" id="login_err">Invalid email or password</div>
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com" required><br><br>
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" required><br><br>
            <button type="submit">Log in</button>
        </form>
        <p class="bottomText">Don't have an account? <a href="signup.html">Sign up for free</a></p>
    </div>
</div>
<script src="login.js"></script>
</body>
</html>
