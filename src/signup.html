<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign-up Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <div class="container2">
        <p class="top">VanillaTask</p>
        <h2 class="major">Create your account</h2>
        <p class="smalltxt">Free forever -- no credit card needed</p>
        <form id="signupForm">
            <label>Username</label>
            <input type="text" id="username" placeholder="e.g. Alex" required><br><br>
            <div class="error" id="username_err"></div>
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com" required><br><br>
            <div class="error" id="email_err"></div>
            <label>Password</label>
            <input type="password" id="password" placeholder="At least 6 characters" oninput="checkStrength()" required><br><br>
            <div class="strengthBox">
                <div id="strengthBar"></div>
            </div>
            <p id="strength"></p>
            <div class="error" id="pass_err"></div><br>
            <label>Confirm Password</label>
            <input type="password" id="confirm" placeholder="Repeat your password" required><br><br>
            <div class="error" id="conf_err"></div>
            <button type="submit">Create account</button>
        </form>
        <p class="bottomText">Already have an account? <a href="login.html">Log in</a></p>
    </div>
</div>
<script src="signup.js"></script>
</body>
</html>
